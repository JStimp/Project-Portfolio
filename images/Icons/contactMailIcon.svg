<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Email icon</title>
  <desc id="desc">A clean envelope contact icon in Cal Poly green and Mustang gold.</desc>
  <style>
    :root {
      --poly-green: #154734;
      --mustang-gold: #BD8B13;
      --off-white: #FFFFFF;
      --sand: #F5F1E8;
    }
    .tile {
      fill: var(--poly-green);
      stroke: var(--mustang-gold);
      stroke-width: 3;
    }
    .envelope {
      fill: var(--sand);
      stroke: var(--mustang-gold);
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .crease {
      fill: none;
      stroke: var(--mustang-gold);
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
  <rect class="tile" x="10" y="10" width="76" height="76" rx="24"/>
  <path class="envelope" d="M26 34.5h44c3.3 0 6 2.7 6 6v27c0 3.3-2.7 6-6 6H26c-3.3 0-6-2.7-6-6v-27c0-3.3 2.7-6 6-6z"/>
  <path class="crease" d="M24 40.5 48 58.5 72 40.5"/>
  <path class="crease" d="M24.5 70 41.6 55.8"/>
  <path class="crease" d="M71.5 70 54.4 55.8"/>
</svg>
